services:
  postgres:
    image: postgres:16-alpine
    container_name: lumencraft-postgres
    environment:
      POSTGRES_USER: lumencraft
      POSTGRES_PASSWORD: lumencraft
      POSTGRES_DB: lumencraft
    ports:
      - "5432:5432"
    volumes:
      - lumencraft-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: lumencraft-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lumencraft
      MINIO_ROOT_PASSWORD: lumencraft-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - lumencraft-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 lumencraft lumencraft-password;
      mc mb -p local/lumencraft-assets;
      mc anonymous set none local/lumencraft-assets;
      exit 0;
      "

  app:
    image: node:22-alpine
    container_name: lumencraft-app
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://lumencraft:lumencraft@postgres:5432/lumencraft?schema=public"
      S3_ENDPOINT: "http://minio:9000"
      S3_PUBLIC_ENDPOINT: "http://localhost:9000"
      NEXT_TELEMETRY_DISABLED: "1"
    command: >
      sh -c "
      npm install &&
      npx prisma generate &&
      npx prisma db push &&
      npm run dev -- --hostname 0.0.0.0 --port 3000
      "
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - lumencraft-node-modules:/app/node_modules
      - lumencraft-next:/app/.next
    depends_on:
      - postgres
      - minio
      - minio-init

volumes:
  lumencraft-postgres:
  lumencraft-minio:
  lumencraft-node-modules:
  lumencraft-next:
